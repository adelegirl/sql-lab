<script>
// ============ 数据库初始化 SQL（三张业务表 + 数据，仅用于顶部预览 · DCL 授权对象就是这些表） ============
// 教学场景说明：
//   - v0.8 DCL 页面不真跑 GRANT/REVOKE（SQLite 不支持），走前端 VIRTUAL_STATE 模拟
//   - 但保留 employee/department/project 三张表用于顶部业务数据预览，让学生记得授权对象是什么
const INIT_SQL = `

CREATE TABLE department (

);

);

INSERT INTO department VALUES

INSERT INTO employee VALUES
  (100, '张伟', 'M', '1990-05-12', 15000, 1),
  (101, '李娜', 'F', '1988-08-23', 18500, 1),
  (102, '王强', 'M', '1985-03-15', 22000, 1),
  (103, '赵敏', 'F', '1992-11-08', 12000, 2),
  (104, '陈磊', 'M', '1987-07-22', 16000, 2),
  (105, '刘洋', 'M', '1995-02-14',  8500, 2),
  (106, '孙丽', 'F', '1991-09-30', 13000, 3),
  (107, '周涛', 'M', '1989-12-05', 14500, 3),
  (108, '吴敏', 'F', '1993-06-18', 11000, 4),
  (109, '郑辉', 'M', '1986-04-27', 20000, 4),
  (110, '徐芳', 'F', '1994-10-11',  9800, 5),
  (111, '朱强', 'M', '1990-01-19', 17500, 5);

INSERT INTO project VALUES
  (1001, '电商平台重构', 500000),
  (1002, '数据中台建设', 800000),
  (1003, '新品发布会', 200000),
  (1004, '客户满意度调研', 150000),
  (1005, '年度审计', 300000),
  (1006, '员工培训体系', 100000);
`;

// ============ VIRTUAL_STATE 初态 ============
const INITIAL_STATE = {
  users: {
    'dba_admin':  { exists: true, password: 'admin@dba' },
    'sales_lead': { exists: true, password: 'sales@2026' },
    'analyst':    { exists: true, password: 'an@2026' },
    'guest':      { exists: true, password: 'guest' }
    // hr_manager 初态不存在
  },
  grants: [
    { user: 'sales_lead', obj: 'project',  priv: 'SELECT', with_grant: false, columns: null },
    { user: 'sales_lead', obj: 'project',  priv: 'INSERT', with_grant: false, columns: null },
    { user: 'sales_lead', obj: 'project',  priv: 'UPDATE', with_grant: false, columns: null },
    { user: 'analyst',    obj: 'employee', priv: 'SELECT', with_grant: false, columns: ['name', 'salary'] }
  ],
  roles: {}
};

function cloneState(s) { return JSON.parse(JSON.stringify(s)); }

// ============ DCL Parser（约 150 行）============
const PRIV_NAMES = ['SELECT', 'INSERT', 'UPDATE', 'DELETE', 'REFERENCES', 'EXECUTE', 'ALTER', 'CREATE', 'DROP', 'INDEX'];

function stripQuotes(s) {
  if (s == null) return s;
  return String(s).replace(/^\s*['"`]|['"`]\s*$/g, '').trim();
}

function parsePrivList(blob) {
  const raw = blob.trim();
  if (/^ALL(\s+PRIVILEGES)?$/i.test(raw)) return { privs: ['ALL'], columns: null };
  const m = raw.match(/^(SELECT|INSERT|UPDATE|DELETE|REFERENCES)\s*\(\s*([^)]+?)\s*\)$/i);
  if (m) {
    const priv = m[1].toUpperCase();
    const cols = m[2].split(',').map(x => stripQuotes(x)).filter(Boolean);
    if (!cols.length) return null;
    return { privs: [priv], columns: cols };
  }
  const parts = raw.split(',').map(x => x.trim().toUpperCase());
  if (parts.length && parts.every(p => PRIV_NAMES.includes(p))) return { privs: parts, columns: null };
  return null;
}

function parseTarget(raw) {
  const s = raw.trim().replace(/@\s*['"`]?[\w%.\-]+['"`]?$/, '');
  return stripQuotes(s);
}

function parseDCL(sql) {
  const s = sql.trim().replace(/;\s*$/, '').replace(/\s+/g, ' ').trim();
  if (!s) return null;

  let m;
  m = s.match(/^CREATE\s+ROLE\s+['"`]?([\w\-]+)['"`]?$/i);
  if (m) return { type: 'CREATE_ROLE', role: m[1] };

  m = s.match(/^CREATE\s+USER\s+((?:['"`][^'"`]+['"`]|[\w\-]+)(?:@['"`]?[\w%.\-]+['"`]?)?)\s+IDENTIFIED\s+BY\s+['"`]([^'"`]*)['"`]$/i);
  if (m) return { type: 'CREATE_USER', user: parseTarget(m[1]), password: m[2] };

  m = s.match(/^CREATE\s+USER\s+((?:['"`][^'"`]+['"`]|[\w\-]+))\s+PASSWORD\s+['"`]([^'"`]*)['"`]$/i);
  if (m) return { type: 'CREATE_USER', user: parseTarget(m[1]), password: m[2] };

  m = s.match(/^DROP\s+USER\s+(?:IF\s+EXISTS\s+)?((?:['"`][^'"`]+['"`]|[\w\-]+)(?:@['"`]?[\w%.\-]+['"`]?)?)$/i);
  if (m) return { type: 'DROP_USER', user: parseTarget(m[1]) };

  m = s.match(/^ALTER\s+USER\s+((?:['"`][^'"`]+['"`]|[\w\-]+)(?:@['"`]?[\w%.\-]+['"`]?)?)\s+IDENTIFIED\s+BY\s+['"`]([^'"`]*)['"`]$/i);
  if (m) return { type: 'ALTER_USER', user: parseTarget(m[1]), password: m[2] };

  m = s.match(/^GRANT\s+(.+?)\s+ON\s+([\w\.]+)\s+TO\s+((?:['"`][^'"`]+['"`]|[\w\-]+)(?:@['"`]?[\w%.\-]+['"`]?)?)(\s+WITH\s+GRANT\s+OPTION)?$/i);
  if (m) {
    const privParsed = parsePrivList(m[1].trim());
    if (!privParsed) return null;
    return {
      type: 'GRANT_PRIV',
      privs: privParsed.privs,
      obj: m[2].split('.').pop(),
      target: parseTarget(m[3]),
      columns: privParsed.columns,
      withGrant: !!m[4]
    };
  }

  m = s.match(/^GRANT\s+((?:['"`][^'"`]+['"`]|[\w\-]+))\s+TO\s+((?:['"`][^'"`]+['"`]|[\w\-]+)(?:@['"`]?[\w%.\-]+['"`]?)?)$/i);
  if (m) return { type: 'GRANT_ROLE', role: parseTarget(m[1]), target: parseTarget(m[2]) };

  m = s.match(/^REVOKE\s+(?:GRANT\s+OPTION\s+FOR\s+)?(.+?)\s+ON\s+([\w\.]+)\s+FROM\s+((?:['"`][^'"`]+['"`]|[\w\-]+)(?:@['"`]?[\w%.\-]+['"`]?)?)$/i);
  if (m) {
    const privParsed = parsePrivList(m[1].trim());
    if (!privParsed) return null;
    return {
      type: 'REVOKE_PRIV',
      privs: privParsed.privs,
      obj: m[2].split('.').pop(),
      target: parseTarget(m[3]),
      columns: privParsed.columns
    };
  }

  m = s.match(/^REVOKE\s+((?:['"`][^'"`]+['"`]|[\w\-]+))\s+FROM\s+((?:['"`][^'"`]+['"`]|[\w\-]+)(?:@['"`]?[\w%.\-]+['"`]?)?)$/i);
  if (m) return { type: 'REVOKE_ROLE', role: parseTarget(m[1]), target: parseTarget(m[2]) };

  return null;
}

function parseAllDCL(sqlBlob) {
  const stmts = sqlBlob.split(';').map(x => x.trim()).filter(Boolean);
  const asts = [];
  const failures = [];
  for (const stmt of stmts) {
    if (/^--/.test(stmt)) continue;
    const cleaned = stmt.replace(/--.*$/gm, '').trim();
    if (!cleaned) continue;
    const ast = parseDCL(cleaned);
    if (ast) asts.push(ast);
    else failures.push({ raw: stmt, reason: 'unrecognized DCL syntax' });
  }
  return { asts, failures };
}

// ============ State 引擎 ============
function applyAst(state, ast) {
  if (!ast) return { ok: false, msg: 'null ast' };
  switch (ast.type) {
    case 'CREATE_USER':
      state.users[ast.user] = { exists: true, password: ast.password };
      return { ok: true };
    case 'DROP_USER':
      delete state.users[ast.user];
      state.grants = state.grants.filter(g => g.user !== ast.user);
      Object.keys(state.roles).forEach(rk => {
        state.roles[rk].granted_to_users = (state.roles[rk].granted_to_users || []).filter(u => u !== ast.user);
      });
      return { ok: true };
    case 'ALTER_USER':
      if (state.users[ast.user]) state.users[ast.user].password = ast.password;
      else state.users[ast.user] = { exists: true, password: ast.password };
      return { ok: true };
    case 'CREATE_ROLE':
      if (!state.roles[ast.role]) state.roles[ast.role] = { privileges: [], granted_to_users: [] };
      return { ok: true };
    case 'GRANT_PRIV': {
      const isRole = !!state.roles[ast.target];
      if (isRole) {
        const arr = state.roles[ast.target].privileges;
        if (ast.privs.includes('ALL')) {
          if (!arr.some(p => p.obj === ast.obj && p.priv === 'ALL')) {
            arr.push({ obj: ast.obj, priv: 'ALL', columns: null, with_grant: ast.withGrant });
          }
        } else {
          ast.privs.forEach(p => {
            if (ast.columns) {
              const existing = arr.find(x => x.obj === ast.obj && x.priv === p && x.columns);
              if (existing) {
                ast.columns.forEach(c => { if (!existing.columns.includes(c)) existing.columns.push(c); });
              } else {
                arr.push({ obj: ast.obj, priv: p, columns: [...ast.columns], with_grant: ast.withGrant });
              }
            } else {
              const existing = arr.find(x => x.obj === ast.obj && x.priv === p && !x.columns);
              if (!existing) arr.push({ obj: ast.obj, priv: p, columns: null, with_grant: ast.withGrant });
              else if (ast.withGrant && !existing.with_grant) existing.with_grant = true;
            }
          });
        }
      } else {
        if (ast.privs.includes('ALL')) {
          const existing = state.grants.find(g => g.user === ast.target && g.obj === ast.obj && g.priv === 'ALL');
          if (!existing) state.grants.push({ user: ast.target, obj: ast.obj, priv: 'ALL', with_grant: ast.withGrant, columns: null });
          else if (ast.withGrant && !existing.with_grant) existing.with_grant = true;
        } else {
          ast.privs.forEach(p => {
            if (ast.columns) {
              const existing = state.grants.find(g => g.user === ast.target && g.obj === ast.obj && g.priv === p && g.columns);
              if (existing) {
                ast.columns.forEach(c => { if (!existing.columns.includes(c)) existing.columns.push(c); });
              } else {
                state.grants.push({ user: ast.target, obj: ast.obj, priv: p, with_grant: ast.withGrant, columns: [...ast.columns] });
              }
            } else {
              const existing = state.grants.find(g => g.user === ast.target && g.obj === ast.obj && g.priv === p && !g.columns);
              if (!existing) state.grants.push({ user: ast.target, obj: ast.obj, priv: p, with_grant: ast.withGrant, columns: null });
              else if (ast.withGrant && !existing.with_grant) existing.with_grant = true;
            }
          });
        }
      }
      return { ok: true };
    }
    case 'GRANT_ROLE':
      if (!state.roles[ast.role]) return { ok: false, msg: `角色 ${ast.role} 不存在` };
      state.roles[ast.role].granted_to_users = state.roles[ast.role].granted_to_users || [];
      if (!state.roles[ast.role].granted_to_users.includes(ast.target)) {
        state.roles[ast.role].granted_to_users.push(ast.target);
      }
      return { ok: true };
    case 'REVOKE_PRIV': {
      const isRole = !!state.roles[ast.target];
      if (isRole) {
        const arr = state.roles[ast.target].privileges;
        if (ast.privs.includes('ALL')) {
          state.roles[ast.target].privileges = arr.filter(p => p.obj !== ast.obj);
        } else if (ast.columns) {
          state.roles[ast.target].privileges = arr.reduce((acc, p) => {
            if (p.obj === ast.obj && ast.privs.includes(p.priv) && p.columns) {
              const remaining = p.columns.filter(c => !ast.columns.includes(c));
              if (remaining.length) acc.push({ ...p, columns: remaining });
            } else acc.push(p);
            return acc;
          }, []);
        } else {
          state.roles[ast.target].privileges = arr.filter(p => !(p.obj === ast.obj && ast.privs.includes(p.priv) && !p.columns));
        }
      } else {
        if (ast.privs.includes('ALL')) {
          state.grants = state.grants.filter(g => !(g.user === ast.target && g.obj === ast.obj));
        } else if (ast.columns) {
          state.grants = state.grants.reduce((acc, g) => {
            if (g.user === ast.target && g.obj === ast.obj && ast.privs.includes(g.priv) && g.columns) {
              const remaining = g.columns.filter(c => !ast.columns.includes(c));
              if (remaining.length) acc.push({ ...g, columns: remaining });
            } else acc.push(g);
            return acc;
          }, []);
        } else {
          state.grants = state.grants.filter(g => !(g.user === ast.target && g.obj === ast.obj && ast.privs.includes(g.priv) && !g.columns));
        }
      }
      return { ok: true };
    }
    case 'REVOKE_ROLE':
      if (state.roles[ast.role]) {
        state.roles[ast.role].granted_to_users = (state.roles[ast.role].granted_to_users || []).filter(u => u !== ast.target);
      }
      return { ok: true };
  }
  return { ok: false, msg: 'unhandled: ' + ast.type };
}

function applyAll(state, asts) {
  const results = [];
  for (const a of asts) results.push(applyAst(state, a));
  return results;
}

// ============ 状态对比 ============
function normGrant(g) {
  const cols = g.columns ? [...g.columns].sort().join(',') : '';
  return `${g.user}|${g.obj}|${g.priv}|${g.with_grant ? '★' : ''}|${cols}`;
}
function normRolePriv(p) {
  const cols = p.columns ? [...p.columns].sort().join(',') : '';
  return `${p.obj}|${p.priv}|${p.with_grant ? '★' : ''}|${cols}`;
}

function stateEquals(a, b) {
  const uA = Object.keys(a.users).sort();
  const uB = Object.keys(b.users).sort();
  if (uA.join(',') !== uB.join(',')) {
    return { pass: false, msg: `用户集合不一致：你 [${uA.join(', ')}] vs 期望 [${uB.join(', ')}]` };
  }
  for (const k of uA) {
    if (String(a.users[k].password) !== String(b.users[k].password)) {
      return { pass: false, msg: `用户 ${k} 密码不匹配：你 "${a.users[k].password}" vs 期望 "${b.users[k].password}"` };
    }
  }
  const gA = new Set(a.grants.map(normGrant));
  const gB = new Set(b.grants.map(normGrant));
  const extra = [...gA].filter(x => !gB.has(x));
  const missing = [...gB].filter(x => !gA.has(x));
  if (extra.length) return { pass: false, msg: `多余的权限记录：${extra.join(' ; ')}` };
  if (missing.length) return { pass: false, msg: `缺少的权限记录：${missing.join(' ; ')}` };
  const rA = Object.keys(a.roles).sort();
  const rB = Object.keys(b.roles).sort();
  if (rA.join(',') !== rB.join(',')) {
    return { pass: false, msg: `角色集合不一致：你 [${rA.join(', ')}] vs 期望 [${rB.join(', ')}]` };
  }
  for (const r of rA) {
    const pA = new Set((a.roles[r].privileges || []).map(normRolePriv));
    const pB = new Set((b.roles[r].privileges || []).map(normRolePriv));
    const e2 = [...pA].filter(x => !pB.has(x));
    const m2 = [...pB].filter(x => !pA.has(x));
    if (e2.length) return { pass: false, msg: `角色 ${r} 多余权限：${e2.join(' ; ')}` };
    if (m2.length) return { pass: false, msg: `角色 ${r} 缺少权限：${m2.join(' ; ')}` };
    const guA = new Set(a.roles[r].granted_to_users || []);
    const guB = new Set(b.roles[r].granted_to_users || []);
    const e3 = [...guA].filter(x => !guB.has(x));
    const m3 = [...guB].filter(x => !guA.has(x));
    if (e3.length) return { pass: false, msg: `角色 ${r} 多授给用户：${e3.join(', ')}` };
    if (m3.length) return { pass: false, msg: `角色 ${r} 少授给用户：${m3.join(', ')}` };
  }
  return { pass: true, msg: 'state matches' };
}

// SQL normalize（兜底比对）
function normalizeSQL(sql) {
  return sql.replace(/--.*$/gm, '').replace(/['"`]/g, '').replace(/\s+/g, ' ').replace(/\s*;\s*$/g, '').trim().toUpperCase();
}

// ============ 全局状态 ============
let SQL, db;
let currentGroup = GROUPS[0].key;
let progress = JSON.parse(localStorage.getItem('sqlplay_dcl_progress_v1') || '{}');

// ============ 初始化 ============
async function init() {
  try {
    SQL = await initSqlJs({ locateFile: f => `https://cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/${f}` });
    resetDBSilent();
    setStatus('ready', '就绪 · 前端模拟 DCL');
    renderNav();
    renderMain(currentGroup);
    updateProgress();
  } catch (e) {
    setStatus('error', '加载失败: ' + e.message);
    console.error(e);
  }
}

function setStatus(cls, text) {
  const el = document.getElementById('status-badge');
  el.className = cls;
  el.textContent = text;
}

function resetDBSilent() {
  if (db) db.close();
  db = new SQL.Database();
  db.run(INIT_SQL);
}

// 重置虚拟状态（工具菜单里的按钮）
function resetState() {
  if (!confirm('此操作会清除所有 GRANT / REVOKE 操作，用户和权限恢复到初始状态：4 个用户（dba_admin / sales_lead / analyst / guest）+ 4 条初始权限记录。你之前的操作会被撤销（进度记录保留）。确认？')) return;
  // 虚拟状态本来就没有"当前"这一份（每题独立 clone INITIAL_STATE 计算），
  // 重置只需要刷新页面重新渲染主界面即可
  renderMain(currentGroup);
  alert('✓ 虚拟状态已重置。权限矩阵回到初始 4 用户 + 4 条权限。');
}

// ============ 侧边栏导航 ============
function renderNav() {
  const container = document.getElementById('nav-list');
  let html = '';
  GROUPS.forEach(g => {
    const groupPassed = LESSONS.filter(L => L.group === g.key && progress[L.id] === 'passed').length;
    const groupTotal = LESSONS.filter(L => L.group === g.key).length;
    html += `<div class="lesson-group ${g.key === currentGroup ? 'active' : ''}" onclick="selectGroup('${g.key}')">
      <span>${g.icon}</span>
      <span>${g.title}</span>
      <span style="margin-left:auto;font-size:11px;color:#8b949e;font-weight:400;">${groupPassed}/${groupTotal}</span>
    </div>`;
    if (g.key === currentGroup) {
      LESSONS.filter(L => L.group === g.key).forEach(L => {
        const state = progress[L.id] || 'none';
        html += `<div class="lesson-item ${state}" onclick="scrollToQu('${L.id}')">
          <span class="lesson-num">${L.id}</span>
          <span class="title-text">${L.title}</span>
          <span class="status-dot"></span>
        </div>`;
      });
    }
  });
  container.innerHTML = html;
}

function selectGroup(key) {
  currentGroup = key;
  renderNav();
  renderMain(key);
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function scrollToQu(id) {
  const el = document.getElementById('qu-' + id);
  if (el) el.scrollIntoView({behavior: 'smooth', block: 'start'});
}

// ============ 主区渲染 ============
function renderMain(groupKey) {
  const g = GROUPS.find(x => x.key === groupKey);
  const lessons = LESSONS.filter(L => L.group === groupKey);
  const main = document.getElementById('main-content');

  let html = `
    <div class="sim-banner">
      ⚠️ <b>本页 DCL SQL 不真跑在 SQLite（引擎不支持 GRANT / REVOKE / CREATE USER）</b>，走前端模拟：学生 SQL 经 parser 解析后，在虚拟权限状态里生效。真实数据库（MySQL / Oracle / SQL Server / PostgreSQL）里，DCL 会立即写入系统表并生效。教学价值：<b>把"看不见的权限变化"可视化</b>，让你直观理解 GRANT / REVOKE 到底改了什么。
    </div>
    <div class="group-header">
      <h1>${g.icon} ${g.title}</h1>
      <div class="subtitle">${g.subtitle}</div>
    </div>
    ${renderStatePreview(INITIAL_STATE, '📊 初始虚拟状态（4 用户 · 4 条初始权限）', null)}
  `;

  lessons.forEach(L => {
    html += renderQu(L);
  });

  main.innerHTML = html;

  // 绑定每题的事件
  lessons.forEach(L => bindQuEvents(L));
  // 顶部初始状态的业务表 tab 绑定
  bindBizPreviewTabs('preview-init');
}

// ============ 权限矩阵 UI（DCL 核心）============
function renderStatePreview(state, headerTitle, containerIdPrefix) {
  const idPrefix = containerIdPrefix || 'preview-init';
  const TABLES = ['employee', 'department', 'project'];
  const users = Object.keys(state.users).sort();

  // 权限矩阵
  let matrixHtml = '<table class="perm-matrix"><thead><tr><th style="min-width:120px">用户 \\ 对象</th>';
  TABLES.forEach(t => matrixHtml += `<th>${t}</th>`);
  matrixHtml += '</tr></thead><tbody>';
  if (users.length === 0) {
    matrixHtml += '<tr><td colspan="4" style="color:#8b949e;padding:20px">（当前无用户）</td></tr>';
  }
  users.forEach(u => {
    matrixHtml += `<tr><td class="user-cell">${escapeHtml(u)}</td>`;
    TABLES.forEach(t => {
      const cellPerms = state.grants.filter(g => g.user === u && g.obj === t);
      if (!cellPerms.length) {
        matrixHtml += '<td class="perm-empty">·</td>';
      } else {
        const parts = cellPerms.map(g => renderPermAbbr(g));
        matrixHtml += `<td class="perm-cell">${parts.join(' / ')}</td>`;
      }
    });
    matrixHtml += '</tr>';
  });
  matrixHtml += '</tbody></table>';

  // 角色卡片
  const roleKeys = Object.keys(state.roles).sort();
  let roleHtml = '';
  if (roleKeys.length) {
    roleHtml = '<details open style="margin-top:14px"><summary style="cursor:pointer;font-weight:600;color:#0969da">🎭 角色列表（' + roleKeys.length + '）</summary><div style="margin-top:8px">';
    roleKeys.forEach(rk => {
      const r = state.roles[rk];
      const permStr = (r.privileges || []).length
        ? (r.privileges).map(p => renderPermAbbr({ priv: p.priv, obj: p.obj, with_grant: p.with_grant, columns: p.columns }) + '@' + p.obj).join(' , ')
        : '（无权限）';
      const users = (r.granted_to_users || []).length ? r.granted_to_users.join(', ') : '（未授给任何用户）';
      roleHtml += `<div class="role-card">
        <b>🎭 ${escapeHtml(rk)}</b>
        <div class="role-perms">🔑 权限：${permStr}</div>
        <div class="role-users">👥 已授予用户：${escapeHtml(users)}</div>
      </div>`;
    });
    roleHtml += '</div></details>';
  } else {
    roleHtml = '<details style="margin-top:14px"><summary style="cursor:pointer;font-weight:600;color:#8b949e">🎭 角色列表（0）</summary><div style="padding:10px;color:#8b949e;font-size:12px">当前没有定义任何角色。CREATE ROLE 后角色会出现在这里。</div></details>';
  }

  // 用户列表快速提示
  const userListHtml = `<div style="margin-top:10px;font-size:12px;color:#57606a">👥 <b>当前用户（${users.length}）</b>：${users.map(u => `<code>${escapeHtml(u)}</code>`).join(' · ') || '（无）'}</div>`;

  // 三张业务表数据（折叠）
  const bizHtml = `
    <div class="biz-preview">
      <details>
        <summary>📋 三张业务表数据（DCL 授权对象 · 折叠参考）</summary>
        <div class="biz-tabs" id="${idPrefix}-tabs">
          <div class="biz-tab active" data-tbl="employee">employee</div>
          <div class="biz-tab" data-tbl="department">department</div>
          <div class="biz-tab" data-tbl="project">project</div>
        </div>
        <div class="biz-body" id="${idPrefix}-body">${renderTablePreview('employee')}</div>
      </details>
    </div>`;

  return `
    <div class="state-preview">
      <div class="state-preview-header">
        <span>${headerTitle}</span>
        <span style="font-size:11px;color:#57606a">${users.length} 用户 · ${state.grants.length} 权限记录 · ${roleKeys.length} 角色</span>
      </div>
      <div class="state-preview-body">
        ${matrixHtml}
        ${userListHtml}
        <div class="perm-legend">
          <b>图例</b>：S=SELECT · I=INSERT · U=UPDATE · D=DELETE · A=ALL · R=REFERENCES · <b>★</b>=WITH GRANT OPTION · <code>(col1,col2)</code>=字段级 · <code>·</code>=无权限
        </div>
        ${roleHtml}
        ${bizHtml}
      </div>
    </div>
  `;
}

function renderPermAbbr(g) {
  const abbr = { SELECT: 'S', INSERT: 'I', UPDATE: 'U', DELETE: 'D', ALL: 'A', REFERENCES: 'R' }[g.priv] || g.priv[0];
  const colStr = g.columns ? `(${g.columns.join(',')})` : '';
  const suffix = g.with_grant ? '★' : '';
  return abbr + colStr + suffix;
}

function bindBizPreviewTabs(idPrefix) {
  const tabsEl = document.getElementById(idPrefix + '-tabs');
  const bodyEl = document.getElementById(idPrefix + '-body');
  if (!tabsEl || !bodyEl) return;
  tabsEl.querySelectorAll('.biz-tab').forEach(tab => {
    tab.addEventListener('click', function() {
      tabsEl.querySelectorAll('.biz-tab').forEach(x => x.classList.remove('active'));
      this.classList.add('active');
      bodyEl.innerHTML = renderTablePreview(this.dataset.tbl);
    });
  });
}

function renderTablePreview(t) {
  try {
    const kindRes = db.exec(`SELECT type FROM sqlite_master WHERE name='${t}';`);
    if (!kindRes.length) return `<div style="padding:16px;color:#cf222e">⚠️ 表 <code>${escapeHtml(t)}</code> 不存在</div>`;
    const dataRes = db.exec(`SELECT * FROM ${t} LIMIT 12`);
    const countRes = db.exec(`SELECT COUNT(*) FROM ${t};`);
    const rowCount = countRes.length ? countRes[0].values[0][0] : 0;
    let html = `<div style="padding:6px 12px;background:#f6f8fa;font-size:11px;color:#57606a;border-bottom:1px solid #eaecef">📊 <b>${escapeHtml(t)}</b>（${rowCount} 行${rowCount > 12 ? '，仅显示前 12 行' : ''}）</div>`;
    if (!dataRes.length) {
      html += `<div style="padding:16px;color:#8b949e;text-align:center;font-size:13px">📭 表 <b>${escapeHtml(t)}</b> 为空</div>`;
    } else {
      html += renderPreviewRows(dataRes[0].columns, dataRes[0].values);
    }
    return html;
  } catch (e) {
    return `<div style="padding:20px;color:#cf222e">读取失败: ${escapeHtml(e.message)}</div>`;
  }
}

function renderPreviewRows(columns, values) {
  const shown = values.slice(0, 12);
  let html = '<table><thead><tr>';
  columns.forEach(c => { html += `<th>${escapeHtml(c)}</th>`; });
  html += '</tr></thead><tbody>';
  shown.forEach(row => {
    html += '<tr>';
    row.forEach(v => {
      const isNum = typeof v === 'number';
      const cls = isNum ? ' class="r"' : '';
      html += `<td${cls}>${v === null ? '<i style="color:#8b949e">NULL</i>' : escapeHtml(String(v))}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  return html;
}

        <button class="ghost" onclick="clearQu('${L.id}')">🗑 清空</button>
      </div>
      <div class="feedback" id="feedback-${L.id}"></div>
      <div class="result-box" id="result-${L.id}">
        <div class="result-header">
          <span id="result-title-${L.id}">运行结果</span>
          <span id="result-meta-${L.id}"></span>
        </div>
        <div class="result-body" id="result-body-${L.id}"></div>
      </div>
      ${(() => {
        const hintsArr = L.hints || ['独立思考一下~'];
        const total = hintsArr.length;
        if (total <= 1) {
          return `<details class="hint-block"><summary>💡 提示</summary><div>${hintsArr[0]}</div></details>`;
        }
        const items = hintsArr.map((h, i) => `<div class="hint-item" id="hint-item-${L.id}-${i}"${i > 0 ? ' style="display:none;margin-top:10px;padding-top:10px;border-top:1px dashed #ffdfb5"' : ''}><b>提示 ${i + 1}：</b>${h}</div>`).join('');
        return `<details class="hint-block">
          <summary>💡 分级提示 · <span id="hint-shown-${L.id}">1</span>/${total}</summary>
          <div>
            ${items}
            <button id="hint-more-${L.id}" onclick="showNextHint('${L.id}', ${total})" style="margin-top:10px; font-size:12px; padding:4px 10px; background:#fff; border:1px solid #ffdfb5; color:#953800; border-radius:4px; cursor:pointer;">👇 继续查看下一条提示</button>
          </div>
        </details>`;
      })()}
      <details class="ans-block">
        <summary>👀 参考答案</summary>
        <div>
          <div id="ans-warn-${L.id}" style="padding:4px 0;">
            <div style="color:#57606a; font-size:12px; margin-bottom:6px;">⚠️ 看答案后就不算你独立完成了哦～建议先按提示多试几次</div>
            <button onclick="revealAnswer('${L.id}')" style="font-size:12px; padding:4px 12px; background:#0969da; color:white; border:none; border-radius:4px; cursor:pointer;">我已知晓，展示答案</button>
          </div>
          <pre id="ans-code-${L.id}" style="display:none">${escapeHtml(L.answer)}</pre>
        </div>
      </details>
    </div>
  `;
}

function bindQuEvents(L) {
  const ta = document.getElementById('sql-' + L.id);
  if (!ta) return;
  ta.addEventListener('keydown', function(e) {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = this.selectionStart, en = this.selectionEnd;
      this.value = this.value.substring(0, s) + '  ' + this.value.substring(en);
      this.selectionStart = this.selectionEnd = s + 2;
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      runQu(L.id);
    }
  });
}

function difficultyLabel(d) {
  return { easy: '简单', medium: '中等', hard: '困难' }[d] || d;
}

// ============ 每题的运行/对答 ============
function getSQL(qid) {
  return document.getElementById('sql-' + qid).value.trim();
}

// 运行：clone INITIAL_STATE + apply baseline + apply 学生 SQL，展示临时状态
function runQu(qid) {
  const L = LESSONS.find(x => x.id === qid);
  const sql = getSQL(qid);
  if (!sql) { showQuFeedback(qid, 'fail', '请先输入 SQL 语句。'); return; }
  const box = document.getElementById('result-' + qid);
  const body = document.getElementById('result-body-' + qid);
  const title = document.getElementById('result-title-' + qid);
  const meta = document.getElementById('result-meta-' + qid);
  hideQuFeedback(qid);
  box.classList.add('show');

  // parse
  const parsed = parseAllDCL(sql);
  if (parsed.asts.length === 0) {
    title.textContent = '✗ DCL 语法不识别';
    meta.textContent = '';
    body.innerHTML = `<div class="err-msg">❌ Parser 未能识别你输入的 DCL 语法。请检查关键字 / 引号 / 语法结构。\n\n支持的语法：\n  CREATE USER 'name' IDENTIFIED BY 'password'\n  DROP USER 'name'\n  ALTER USER 'name' IDENTIFIED BY 'newpwd'\n  CREATE ROLE 'role_name'\n  GRANT priv[, priv | (col1, col2)] ON obj TO 'user' [WITH GRANT OPTION]\n  GRANT 'role' TO 'user'\n  REVOKE priv[, priv | (col1, col2)] ON obj FROM 'user'\n  REVOKE 'role' FROM 'user'\n\n你的输入：\n${escapeHtml(sql)}${parsed.failures.length ? '\n\n失败语句：\n  ' + parsed.failures.map(f => f.raw).join('\n  ') : ''}</div>`;
    showQuFeedback(qid, 'fail', '❌ DCL 语法不识别，请检查关键字/引号。');
    return;
  }

  const t0 = performance.now();
  const state = cloneState(INITIAL_STATE);
  // 先叠加 baseline
  if (L.baseline && L.baseline.length) {
    L.baseline.forEach(b => {
      const bp = parseAllDCL(b);
      applyAll(state, bp.asts);
    });
  }
  // 再叠加学生 SQL
  const applyResults = applyAll(state, parsed.asts);
  const dt = (performance.now() - t0).toFixed(1);
  const errApply = applyResults.find(r => !r.ok);

  title.textContent = errApply ? '⚠️ 状态变更部分成功' : '✓ 模拟执行完成';
  meta.textContent = `${dt}ms · 前端虚拟状态（不影响初态）`;

  // 展示模拟后的完整状态
  let html = renderStatePreview(state, `🔍 你的 SQL 跑完后的虚拟状态（${parsed.asts.length} 条 DCL 语句已应用）`, `preview-${qid}`);
  if (errApply) {
    html = `<div style="padding:8px 12px;background:#ffebe9;border-bottom:1px solid #ffa198;color:#82071e;font-size:12px">⚠️ ${escapeHtml(errApply.msg)}</div>` + html;
  }
  body.innerHTML = html;
  bindBizPreviewTabs(`preview-${qid}`);

  // 标记为尝试过
  if (progress[qid] !== 'passed') {
    progress[qid] = 'attempted';
    saveProgress(); renderNav(); updateProgress();
  }
}

// 对答案：双 clone INITIAL_STATE，各自 apply baseline + apply answer/student，对比最终 state
function checkQu(qid) {
  const L = LESSONS.find(x => x.id === qid);
  const sql = getSQL(qid);
  if (!sql) { showQuFeedback(qid, 'fail', '请先输入 SQL 语句。'); return; }

  // parse 学生
  const stuParsed = parseAllDCL(sql);
  // parse 答案
  const ansParsed = parseAllDCL(L.answer);

  // 方式 A：结构对比（主）
  let passA = false, msgA = '', canRunA = true;
  if (stuParsed.asts.length === 0) {
    canRunA = false;
    msgA = 'parser 未能识别你的 SQL，尝试兜底 SQL 字符串比对';
  }
  let stuState = null, ansState = null;
  if (canRunA) {
    stuState = cloneState(INITIAL_STATE);
    ansState = cloneState(INITIAL_STATE);
    if (L.baseline && L.baseline.length) {
      L.baseline.forEach(b => {
        const bp = parseAllDCL(b);
        applyAll(stuState, bp.asts);
        applyAll(ansState, bp.asts);
      });
    }
    applyAll(stuState, stuParsed.asts);
    applyAll(ansState, ansParsed.asts);
    const cmp = stateEquals(stuState, ansState);
    passA = cmp.pass;
    msgA = cmp.msg;
  }

  // 方式 B：SQL normalize 兜底
  let passB = false;
  if (!passA) {
    passB = normalizeSQL(sql) === normalizeSQL(L.answer);
  }

  const pass = passA || passB;
  const box = document.getElementById('result-' + qid);
  const body = document.getElementById('result-body-' + qid);
  const title = document.getElementById('result-title-' + qid);
  const meta = document.getElementById('result-meta-' + qid);
  box.classList.add('show');

  if (pass) {
    title.textContent = '你的最终虚拟状态';
    meta.textContent = passA ? '结构对比通过' : 'SQL normalize 兜底通过';
    // 展示学生的最终 state
    if (!stuState) {
      // parseA 失败但 SQL 字面等价 —— 显示答案状态
      stuState = cloneState(INITIAL_STATE);
      if (L.baseline) L.baseline.forEach(b => applyAll(stuState, parseAllDCL(b).asts));
      applyAll(stuState, ansParsed.asts);
    }
    body.innerHTML = renderStatePreview(stuState, '✅ 你的最终虚拟状态（与参考答案一致）', `preview-${qid}`);
    bindBizPreviewTabs(`preview-${qid}`);
    showQuFeedback(qid, 'pass', `✅ <b>通过！</b> ${passA ? '虚拟状态与参考答案完全一致。' : '结构对比未过，但 SQL 字符串与答案等价，通过。'}`);
    progress[qid] = 'passed';
    saveProgress(); renderNav(); updateProgress();
    const iconEl = document.querySelector(`#qu-${qid} h2 > span:last-child`);
    if (iconEl) iconEl.textContent = '✅';
  } else {
    title.textContent = '你的最终虚拟状态 vs 参考答案';
    meta.textContent = '';
    let html = '';
    if (stuState) {
      html += renderStatePreview(stuState, '❌ 你的最终虚拟状态', `preview-${qid}-stu`);
      html += renderStatePreview(ansState, '📖 参考答案的最终虚拟状态（供对照）', `preview-${qid}-ans`);
    } else {
      html = `<div style="padding:12px;color:#cf222e">❌ Parser 未能识别你的 SQL，无法进行结构对比。SQL 字符串与答案也不等价。</div>`;
    }
    body.innerHTML = html;
    bindBizPreviewTabs(`preview-${qid}-stu`);
    bindBizPreviewTabs(`preview-${qid}-ans`);
    showQuFeedback(qid, 'fail', `❌ <b>未通过。</b> ${escapeHtml(msgA || '结构对比失败')}`);
    if (progress[qid] !== 'passed') {
      progress[qid] = 'attempted';
      saveProgress(); renderNav(); updateProgress();
    }
  }
}

function clearQu(qid) {
  document.getElementById('sql-' + qid).value = '';
  hideQuFeedback(qid);
  document.getElementById('result-' + qid).classList.remove('show');
}

function resetStarter(qid) {
  const L = LESSONS.find(x => x.id === qid);
  document.getElementById('sql-' + qid).value = L.starter;
  hideQuFeedback(qid);
}

function showQuFeedback(qid, cls, msg) {
  const el = document.getElementById('feedback-' + qid);
  el.className = 'feedback show ' + cls;
  el.innerHTML = msg;
}
function hideQuFeedback(qid) {
  document.getElementById('feedback-' + qid).className = 'feedback';
}

// ============ 进度 ============
function saveProgress() { localStorage.setItem('sqlplay_dcl_progress_v1', JSON.stringify(progress)); }
function updateProgress() {
  const passed = Object.values(progress).filter(v => v === 'passed').length;
  document.getElementById('progress-text').textContent = `进度 ${passed} / ${LESSONS.length}`;
  document.getElementById('progress-bar-inner').style.width = (passed / LESSONS.length * 100) + '%';
}
function resetProgress() {
  if (!confirm('确定清除所有进度？（虚拟状态不受影响）')) return;
  progress = {}; saveProgress(); renderNav(); updateProgress();
  renderMain(currentGroup);
}

// ============ 工具 ============
function showNextHint(qid, total) {
  const shownEl = document.getElementById('hint-shown-' + qid);
  if (!shownEl) return;
  let shown = parseInt(shownEl.textContent);
  if (shown < total) {
    const nextItem = document.getElementById(`hint-item-${qid}-${shown}`);
    if (nextItem) nextItem.style.display = '';
    shown++;
    shownEl.textContent = shown;
    if (shown >= total) {
      const btn = document.getElementById('hint-more-' + qid);
      if (btn) btn.style.display = 'none';
    }
  }
}

function revealAnswer(qid) {
  const warn = document.getElementById('ans-warn-' + qid);
  const code = document.getElementById('ans-code-' + qid);
  if (warn) warn.style.display = 'none';
  if (code) code.style.display = '';
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

init();
</script>
